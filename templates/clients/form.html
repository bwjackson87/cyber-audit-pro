{% extends "base.html" %}
{% block title %}{% if action == 'edit' %}Edit Client{% else %}New Client{% endif %} — CyberAudit Pro{% endblock %}
{% block content %}
<div class="p-8 max-w-2xl">
  <div class="mb-6">
    <a href="/clients/" class="text-sm text-slate-500 hover:text-indigo-600">← Clients</a>
    <h1 class="text-2xl font-bold text-slate-900 mt-2">
      {% if action == 'edit' %}Edit Client{% else %}New Client{% endif %}
    </h1>
  </div>

  <form method="post" action="{% if action == 'edit' %}/clients/{{ client.id }}/edit{% else %}/clients/new{% endif %}" class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 space-y-5">

    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Organization Name <span class="text-red-500">*</span></label>
      <input type="text" name="name" required value="{{ client.name if client else '' }}"
             class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent" placeholder="Acme Corporation">
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Industry</label>
        <select name="industry" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
          <option value="">Select industry</option>
          {% for ind in ['Healthcare', 'Finance / Banking', 'Insurance', 'Legal', 'Manufacturing', 'Retail / E-Commerce', 'Technology', 'Government / Public Sector', 'Education', 'Non-Profit', 'Construction', 'Energy / Utilities', 'Transportation / Logistics', 'Professional Services', 'Other'] %}
          <option value="{{ ind }}" {% if client and client.industry == ind %}selected{% endif %}>{{ ind }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Phone</label>
        <input type="tel" name="phone" value="{{ client.phone if client else '' }}"
               class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="(555) 123-4567">
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Primary Email</label>
        <input type="email" name="email" value="{{ client.email if client else '' }}"
               class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="contact@company.com">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Website</label>
        <input type="text" name="website" value="{{ client.website if client else '' }}"
               class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="https://www.company.com">
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Address</label>
      <textarea name="address" rows="2"
                class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="123 Main St, City, State 12345">{{ client.address if client else '' }}</textarea>
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Notes</label>
      <textarea name="notes" rows="3"
                class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Internal notes about this client...">{{ client.notes if client else '' }}</textarea>
    </div>

    <div class="flex gap-3 pt-2">
      <button type="submit" class="bg-indigo-600 text-white px-5 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700 transition-colors">
        {% if action == 'edit' %}Save Changes{% else %}Create Client{% endif %}
      </button>
      <a href="{% if action == 'edit' %}/clients/{{ client.id }}{% else %}/clients/{% endif %}"
         class="px-5 py-2 rounded-lg text-sm font-medium text-slate-700 bg-slate-100 hover:bg-slate-200 transition-colors">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
